<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎂 A Surprise For Divya ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ================= BACKGROUND ================= -->

<div class="background">

<div class="stars"></div>

<div class="floating-hearts"></div>

</div>

<!-- ================= PAGE 1 ================= -->

<section class="page active" id="page1">

<div class="stickers">

<div class="sticker s1">🐱</div>
<div class="sticker s2">🐶</div>
<div class="sticker s3">🐻</div>
<div class="sticker s4">🐱</div>
<div class="sticker s5">🐶</div>
<div class="sticker s6">🐰</div>
<div class="sticker s7">🐱</div>
<div class="sticker s8">🐶</div>

</div>

<div class="welcome-card">

<h1>
Hii Divya 🥺💕
</h1>

<p>

I made something very special...

Just for you ❤️

<br><br>

Would you like to see it?

</p>

<div class="button-area">

<button id="yesBtn">

💖 I Want To See!!

</button>

<button id="noBtn">

🤍 I Don't Want To See!!

</button>

</div>

<p id="cuteMessage"></p>

</div>

</section>

<!-- ================= PAGE 2 ================= -->

<section class="page" id="page2">

<div class="gift-container">

<h1>

Good Girl!! 🥹💖

</h1>

<p>

I knew you'd click YES!!

</p>

<div id="giftBox">

🎁

</div>

<h2>

Click the gift to open it...

</h2>

</div>

</section>
<!-- ================= PAGE 3 ================= -->

<section class="page" id="page3">

<div class="birthdayReveal">

<h1 class="birthdayTitle">
🎉 Happy Birthday Divya ❤️
</h1>

<p class="birthdaySub">
Someone has a little surprise waiting...
</p>

<div class="giftBox3D" id="gift3D">

<div class="giftLid"></div>

<div class="giftRibbonV"></div>

<div class="giftRibbonH"></div>

<div class="giftBody"></div>

</div>

<button id="openGiftButton">

🎀 Open My Gift

</button>

</div>

</section>
